name: Validate cards

# Lightweight PR gate: format-check the cards and run unit tests (no TTS, no
# rendering) so malformed cards and broken code are blocked before merge — the
# full build/release runs post-merge in release-cards.yml. Runs on every PR
# (not path-filtered) because "validate" is a required status check: a
# path-filtered required check would leave non-card PRs stuck un-mergeable.

on:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate card format
        run: pnpm validate

      - name: Run tests
        run: pnpm test
