name: Release cards

# When card JSONs land on main and pass the format check, build each changed
# card (TTS audio + Remotion render) and publish long.mp4 / short.mp4 /
# audio.mp3 / config.json as assets on a per-card GitHub Release (tag card-<id>).
# Re-pushing a card updates its release assets in place.
#
# Two-stage layout: `detect` validates once and emits the card list; `build`
# fans out as a matrix — one runner per card, so ten cards render in parallel
# instead of queueing in one job.

on:
  push:
    branches: [main]
    paths:
      - "cards/*.json"
  workflow_dispatch:
    inputs:
      card_ids:
        description: "Space-separated card ids to build (empty = all cards)"
        required: false
        default: ""

permissions:
  contents: write
  # Close the originating issue and comment the release link once built.
  issues: write

jobs:
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      ids: ${{ steps.cards.outputs.ids }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect changed cards
        id: cards
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ inputs.card_ids }}" ]; then
              ids="${{ inputs.card_ids }}"
            else
              ids=$(ls cards/*.json | grep -v '/_' | xargs -n1 basename | sed 's/\.json$//' | tr '\n' ' ')
            fi
          else
            before="${{ github.event.before }}"
            if [ "$before" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$before" 2>/dev/null; then
              range="HEAD^..HEAD"
            else
              range="$before..HEAD"
            fi
            ids=$(git diff --name-only --diff-filter=AM "$range" -- 'cards/*.json' \
              | grep -v '^cards/_' | xargs -r -n1 basename | sed 's/\.json$//' | tr '\n' ' ')
          fi
          ids_json=$(printf '%s\n' $ids | grep . | jq -R . | jq -cs .) || ids_json="[]"
          echo "ids=$ids_json" >> "$GITHUB_OUTPUT"
          echo "Cards to build: $ids_json"

      - uses: pnpm/action-setup@v6
        if: steps.cards.outputs.ids != '[]'

      - uses: actions/setup-node@v6
        if: steps.cards.outputs.ids != '[]'
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        if: steps.cards.outputs.ids != '[]'
        run: pnpm install --frozen-lockfile

      - name: Validate card format
        if: steps.cards.outputs.ids != '[]'
        run: pnpm validate

      - name: Run tests
        if: steps.cards.outputs.ids != '[]'
        run: pnpm test

  build:
    needs: detect
    if: needs.detect.outputs.ids != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        card: ${{ fromJson(needs.detect.outputs.ids) }}
    name: build (${{ matrix.card }})
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history so we can trace the card file back to its issue.
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Remotion downloads Chrome Headless Shell (~150MB) into
      # node_modules/.remotion on first render; cache it across runs.
      # Restored after pnpm install so the install can't clobber it.
      - name: Cache Remotion browser
        uses: actions/cache@v6
        with:
          path: node_modules/.remotion
          key: remotion-browser-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      # Trace this card back to its originating issue (the add-commit records
      # "from issue #N"). Empty for hand-added cards / workflow_dispatch — every
      # progress + close step below is guarded on it, so those runs stay silent.
      - name: Resolve source issue
        id: src
        run: |
          id="${{ matrix.card }}"
          add_msg=$(git log --diff-filter=A --format=%s -- "cards/$id.json" | grep -i 'issue #' | head -1 || true)
          issue=$(printf '%s' "$add_msg" | grep -oE '#[0-9]+' | head -1 | tr -d '#' || true)
          echo "issue=$issue" >> "$GITHUB_OUTPUT"
          echo "Source issue: ${issue:-none}"

      - name: Progress → generating audio
        if: steps.src.outputs.issue != ''
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: pnpm issue-progress "${{ steps.src.outputs.issue }}" audio

      - name: Generate TTS audio
        run: pnpm audio ${{ matrix.card }}

      - name: Progress → rendering
        if: steps.src.outputs.issue != ''
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: pnpm issue-progress "${{ steps.src.outputs.issue }}" render

      - name: Render videos
        run: pnpm render ${{ matrix.card }}

      - name: Progress → publishing
        if: steps.src.outputs.issue != ''
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: pnpm issue-progress "${{ steps.src.outputs.issue }}" release

      - name: Publish release
        id: publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          id="${{ matrix.card }}"
          tag="card-$id"
          title=$(node -p "require('./cards/$id.json').title")
          # Release body = the card's releaseNote, with a build footer.
          node -p "require('./cards/$id.json').releaseNote" > notes.md
          printf '\n\n---\n_Automated build of card `%s` from %s._\n' "$id" "$GITHUB_SHA" >> notes.md
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "$title" --notes-file notes.md
          else
            gh release create "$tag" --title "$title" --notes-file notes.md
          fi
          gh release upload "$tag" --clobber \
            "out/$id/long.mp4" "out/$id/short.mp4" "out/$id/audio.mp3" "out/$id/config.json"
          # Expose the release URL for the final progress + close step.
          echo "url=$(gh release view "$tag" --json url -q .url)" >> "$GITHUB_OUTPUT"

      # Release succeeded: flip the progress comment to 🎉 (with the release link
      # and total elapsed time), then close the originating issue.
      - name: Finish & close issue
        if: success() && steps.src.outputs.issue != ''
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE: ${{ steps.src.outputs.issue }}
          URL: ${{ steps.publish.outputs.url }}
        run: |
          pnpm issue-progress "$ISSUE" done "$URL"
          gh issue close "$ISSUE" --reason completed || true
