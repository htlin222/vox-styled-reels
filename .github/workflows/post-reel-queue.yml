name: Post one reel to FB (hourly queue)

# Drips card releases to the Dr. 蜥蜴 Facebook Page as Reels, one per hour.
# Rate limit: the Reels API allows 30 API-published posts per rolling 24h,
# so 1/hour (max 24/day) stays comfortably under the ceiling.
#
# Queue      = every `card-*` release, oldest first.
# Posted log = fb-posted.txt on the unprotected `fb-state` branch (main is a
#              protected branch and rejects the bot's write-back), read/written
#              via the Contents API. Ensures a reel is never published twice.
# Tool       = fb-cli's `post-reel`, installed on the fly straight from git.

on:
  schedule:
    - cron: "17 * * * *" # hourly at :17
  workflow_dispatch: {} # manual trigger

concurrency:
  group: fb-reel-queue
  cancel-in-progress: false

permissions:
  contents: write # Contents API write to the fb-state branch

env:
  STATE_BRANCH: fb-state
  STATE_FILE: fb-posted.txt

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Pick oldest unposted card release
        id: pick
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Read the posted log from the fb-state branch (empty if absent).
          gh api "repos/$GITHUB_REPOSITORY/contents/$STATE_FILE?ref=$STATE_BRANCH" \
            --jq '.content' 2>/dev/null | base64 --decode > posted.txt || : > posted.txt
          mapfile -t all < <(gh release list -R "$GITHUB_REPOSITORY" -L 500 --json tagName,createdAt \
            -q 'sort_by(.createdAt) | .[] | select(.tagName|startswith("card-")) | .tagName')
          next=""
          for t in "${all[@]}"; do
            if ! grep -qxF "$t" posted.txt; then next="$t"; break; fi
          done
          if [ -z "$next" ]; then
            echo "queue empty — nothing to post"
          else
            echo "next reel: $next"
          fi
          echo "tag=$next" >> "$GITHUB_OUTPUT"

      - name: Download reel asset
        if: steps.pick.outputs.tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.pick.outputs.tag }}
        run: |
          gh release download "$TAG" -R "$GITHUB_REPOSITORY" -p short.mp4 --clobber
          test -f short.mp4 || { echo "::error::short.mp4 missing on $TAG"; exit 1; }

      - name: Publish to Facebook
        if: steps.pick.outputs.tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.pick.outputs.tag }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
        run: |
          name=$(gh release view "$TAG" -R "$GITHUB_REPOSITORY" --json name -q .name)
          # Caption = release title + note; drop the "---" automated-build footer.
          note=$(gh release view "$TAG" -R "$GITHUB_REPOSITORY" --json body -q .body | sed '/^---$/,$d')
          caption=$(printf '%s\n\n%s' "$name" "$note")
          uvx --from git+https://github.com/htlin222/fb-cli fb-cli post-reel short.mp4 "$caption"

      - name: Mark as posted (write back to fb-state)
        if: steps.pick.outputs.tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.pick.outputs.tag }}
        run: |
          # Ensure the fb-state branch exists (bootstrap from this ref's head).
          if ! gh api "repos/$GITHUB_REPOSITORY/git/ref/heads/$STATE_BRANCH" >/dev/null 2>&1; then
            head=$(gh api "repos/$GITHUB_REPOSITORY/git/ref/heads/$GITHUB_REF_NAME" --jq .object.sha)
            gh api --method POST "repos/$GITHUB_REPOSITORY/git/refs" \
              -f ref="refs/heads/$STATE_BRANCH" -f sha="$head" >/dev/null
          fi
          echo "$TAG" >> posted.txt
          sha=$(gh api "repos/$GITHUB_REPOSITORY/contents/$STATE_FILE?ref=$STATE_BRANCH" --jq .sha 2>/dev/null || true)
          content=$(base64 -w0 < posted.txt)
          gh api --method PUT "repos/$GITHUB_REPOSITORY/contents/$STATE_FILE" \
            -f message="chore(fb): posted $TAG as reel [skip ci]" \
            -f content="$content" -f branch="$STATE_BRANCH" ${sha:+-f sha="$sha"} >/dev/null
          echo "recorded $TAG on $STATE_BRANCH"
